body:
  text: 太上洞玄靈寶救苦妙經太上洞玄靈寶天尊説濟苦經太上洞玄靈寶淨供妙經太上洞玄靈寶救苦妙經爾時救苦天尊遍滿十方界常以威神力救拔諸衆生得離於迷途衆生不知覺如盲見日月我本太無中拔領無邊際慶雲開生門祥煙塞死户初發玄元始以統祥感機救一切罪度一切厄渺渺超仙源蕩蕩自然清皆承大道力以伏諸魔精空中何灼灼名曰泥九仙紫雲覆黃老是名三寶君還將上天氣以制九天魂救苦諸妙神善見救苦時天上混無分天氣歸一身皆成自然人自然有别體本在空洞中空洞迹非迹遍體皆虛空第一委氣立第二順氣生第三成萬法第四主光明天上三十六地下三十六太玄無邊際妙哉大洞經歸命太上尊能消一切罪東方玉寶皇上天尊南方玄真萬福天尊西方太妙至極天尊北方玄丄玉宸天尊東北方度仙上聖天尊東南方好生度命天尊西南方太靈虛皇天尊西比方無量太華天尊上方玉虛明皇天尊下方真皇洞神天尊道言十方諸天尊其數如沙塵化形十方界普濟度天人委氣聚功德同聲救罪魂罪魂實可哀我今説妙經念誦無休息歸身不暫停天堂享大福地獄無苦聲火翳成清署劔樹化為騫上登朱陵府下入開光門超度三界難徑上元始天於是飛天神王無鞅數衆瞻仰尊顏而作頌曰天尊説經教引接於浮生勤修學無為悟真道自成不迷亦不荒無我亦無名朗詠罪福句萬遍心垢清爾時飛天神王及諸仙衆説是頌畢稽首天尊奉辭而退太上洞玄靈寶救苦妙經宣和甲辰秋池州城下景德禪院有僧童莫道祖偶緣母親傾逝追慕不巳日誦本教經薦擢用酬罔極之思至秋末有太平州田功曹宣教到院安下每見功曹常以天樞法救人疾苦能追攝死魂以詰升沈道祖見其靈異遂具狀申陳乞行拯拔其官人受狀判押燒令神將去即時追攝道祖母氏到壇前問曰你咒道祖日夕誦經追擢尚羈冥司如何母對曰雖得吾咒道祖念經報薦其誠志未孚若作六六功德幽置普獲霑恩妾即得超生是時若男若女數百餘人咸罹痛苦功曹復問曰何謂六六答云黃籙水陸道祖泣告曰自幼捨慈親依棲梵剎身計未成何緣有力為大功果母曰不然但志心轉誦道教有太上救苦經及持念太乙救苦天尊御號冥司簡奏上天功即應聲至矣又曰冥司限促不敢久留乃作禮謝而去道祖即告功曹求受太上救苦經及天尊號日夜虔誠兼而誦之各積千遍具疏焚化是夜母親見夢於道祖曰汝今不負鞠育之恩誦經持號誠格高真蒙上帝符命我巳得生天矣自後無復見汝汝冝自勉力勿忘正教言訖乘雲冉冉而去忠翊郎添差池州監押趙子俅述
